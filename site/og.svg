  <text x="90" y="372" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700" fill="#f1eee7">rederive</text>
  <text x="92" y="442" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="600" fill="#d4956a">Don&#39;t trust packages. Re-derive them.</text>
